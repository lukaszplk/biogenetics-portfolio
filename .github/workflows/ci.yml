name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install numpy pandas scipy matplotlib seaborn scikit-learn biopython statsmodels

      - name: Run RNA-seq analysis
        run: python 01_rna_seq/rna_seq_de_analysis.py

      - name: Run QSAR drug discovery
        run: python 02_drug_discovery/qsar_drug_activity.py

      - name: Run GWAS visualisation
        run: python 03_population_genetics/gwas_visualization.py

      - name: Run protein analysis
        run: python 04_protein_analysis/protein_analysis.py

      - name: Run format parser
        run: python utils/format_parser.py
